<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>GoPlay App</title>
    <meta
      name="description"
      content="Sua plataforma imersiva de atividades e notificações motivacionais."

    <meta

      content="https://img.usecurling.com/p/512/512?q=purple%20letter%20g%20logo&color=purple"

    <link
      rel="apple-touch-icon"

    <meta name="apple-mobile-web-app-capable" content="yes" />

  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((err) => {
            console.log('ServiceWorker registration failed: ', err)
          })
        })
      }
    </script>
    <script src="https://goskip.dev/skip.js"></script>
    <script type="module" src="/src/main.tsx"></script>
