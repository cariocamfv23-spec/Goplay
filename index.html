<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>GoPlay</title>
    <meta
      name="description"
      content="Sua plataforma imersiva de atividades e notificações motivacionais."
    />
    <meta name="author" content="GoPlay" />
    <meta property="og:image" content="/og-image.png" />

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="GoPlay" />
    <link rel="apple-touch-icon" href="/og-image.png" />
  </head>

  <body>
    <div id="root"></div>
    <script src="https://goskip.dev/skip.js"></script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(
            (registration) => {
              console.log(
                'ServiceWorker registration successful com escopo: ',
                registration.scope,
              )
            },
            (err) => {
              console.log('ServiceWorker registration falhou: ', err)
            },
          )
        })
      }
    </script>
  </body>
</html>
