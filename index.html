<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>GoPlay</title>
    <meta
      name="description"
      content="O seu esporte, levado a sério. Seu talento merece um palco do tamanho do mundo."
    />
    <meta name="author" content="Goplay" />
    <meta property="og:image" content="/og-image.png" />

    <!-- PWA Configuration -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="GoPlay" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <link rel="manifest" href="/manifest.json" />
  </head>

  <body>
    <div id="root"></div>
    <script src="https://goskip.dev/skip.js"></script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register Service Worker for PWA Offline Support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then((registration) => {
              console.log(
                'ServiceWorker registration successful with scope: ',
                registration.scope,
              )
            })
            .catch((error) => {
              console.log('ServiceWorker registration failed: ', error)
            })
        })
      }
    </script>
  </body>
</html>
